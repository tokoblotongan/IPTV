<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Ultimate Tool</title>
<style>
  body {
    background: #0a0e1a;
    color: #e2e8f0;
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  h1 { color: #3b82f6; }
  .card {
    background: #1a2235;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  input, select, button {
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    width: 100%;
  }
  button {
    background: #3b82f6;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover { background: #2563eb; }
  .log {
    background: #020617;
    padding: 15px;
    border-radius: 8px;
    font-family: monospace;
    max-height: 300px;
    overflow-y: auto;
    margin-top: 10px;
  }
  .success { color: #22c55e; }
  .error { color: #ef4444; }
</style>
</head>
<body>
<div class="container">

  <h1>⚡ IPTV Ultimate Tool</h1>
  <p>Backend Proxy Active - Mengatasi HTTP 461</p>

  <!-- MAC PORTAL SECTION -->
  <div class="card">
    <h2>📺 MAC Portal Test</h2>
    <div>
      <label>Portal URL</label>
      <input type="text" id="mac-portal" value="http://line.glantv.com:80/c" placeholder="http://domain.com:port/c">
    </div>
    <div>
      <label>MAC Address</label>
      <input type="text" id="mac-address" value="00:1A:79:64:25:54" placeholder="00:1A:79:XX:XX:XX">
    </div>
    <button onclick="testMacPortal()">🔍 Test MAC Portal via Proxy</button>
  </div>

  <div class="log" id="log-output"></div>

</div>

<script>
// ==================== HELPER ====================
function log(msg, type = '') {
  const logEl = document.getElementById('log-output');
  const time = new Date().toLocaleTimeString();
  let colorClass = '';
  if (type === 'success') colorClass = 'success';
  if (type === 'error') colorClass = 'error';
  
  logEl.innerHTML += `<div>[${time}] <span class="${colorClass}">${msg}</span></div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

log('🚀 IPTV Ultimate Tool siap. Proxy aktif.', 'success');

// ==================== TEST MAC VIA PROXY ====================
async function testMacPortal() {
  const portal = document.getElementById('mac-portal').value.trim();
  const mac = document.getElementById('mac-address').value.trim().toUpperCase();

  if (!portal || !mac) {
    log('❌ Portal URL dan MAC Address wajib diisi!', 'error');
    return;
  }

  log('🔄 Menghubungi Vercel Proxy...', '');

  try {
    const formData = new FormData();
    formData.append('mode', 'mac');
    formData.append('server', portal);
    formData.append('mac_address', mac);

    const response = await fetch('/test', {
      method: 'POST',
      body: formData
    });

    const result = await response.json();

    if (result.status === 'success') {
      log(`✅ ${result.message}`, 'success');
    } else {
      log(`❌ ${result.message || 'Gagal terhubung'}`, 'error');
    }

  } catch (err) {
    log(`❌ Network Error: ${err.message}`, 'error');
    log('⚠️ Pastikan sudah redeploy setelah update vercel.json', '');
  }
}
</script>
</body>
</html>
