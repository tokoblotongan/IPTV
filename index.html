<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Ultimate Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }
  input, select, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
  }
  button {
    background: var(--accent);
    color: white;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #2563eb; }
  .log-box {
    background: #020617;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 15px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    max-height: 400px;
    overflow-y: auto;
    margin-top: 10px;
  }
  .log-ok { color: var(--green); }
  .log-err { color: var(--red); }
</style>
</head>
<body>
<div class="wrap">

  <h1 style="text-align:center; margin-bottom:10px;">IPTV Ultimate Tool</h1>
  <p style="text-align:center; color:var(--muted);">Proxy Backend Active - Mengatasi 461</p>

  <!-- MAC PORTAL -->
  <div class="card">
    <h2>📺 MAC Portal</h2>
    <input type="text" id="mac-portal" value="http://line.glantv.com:80/c" placeholder="Portal URL">
    <input type="text" id="mac-addr" value="00:1A:79:64:25:54" placeholder="MAC Address (00:1A:79:XX:XX:XX)">
    
    <button onclick="runMacScan()">🔍 Test MAC Portal (via Proxy)</button>
    
    <div class="log-box" id="mac-log"></div>
  </div>

</div>

<script>
// ==================== LOG HELPER ====================
function log(id, msg, cls='') {
  const el = document.getElementById(id);
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function logClear(id) {
  document.getElementById(id).innerHTML = '';
}

// ==================== TEST MAC VIA PROXY ====================
async function runMacScan() {
  const portal = document.getElementById('mac-portal').value.trim().replace(/\/+$/, '');
  const mac = document.getElementById('mac-addr').value.trim().toUpperCase();

  if (!portal || !mac) {
    alert('Portal URL dan MAC Address wajib diisi!');
    return;
  }

  logClear('mac-log');
  log('mac-log', '🔄 Menghubungi Vercel Proxy...', 'log-ok');

  try {
    const formData = new FormData();
    formData.append('mode', 'mac');
    formData.append('server', portal);
    formData.append('mac_address', mac);

    const response = await fetch('/test', {
      method: 'POST',
      body: formData
    });

    const result = await response.json();

    if (result.status === 'success') {
      log('mac-log', `✅ ${result.message}`, 'log-ok');
      log('mac-log', 'Proxy berhasil mengakses portal!', 'log-ok');
    } else {
      log('mac-log', `❌ ${result.message || 'Gagal'}`, 'log-err');
    }

  } catch (e) {
    log('mac-log', `❌ Network Error: ${e.message}`, 'log-err');
    log('mac-log', 'Cek apakah sudah redeploy terbaru?', '');
  }
}
</script>
</body>
</html>
